    <script>
        const select = document.getElementById('slide-select');
        const img = document.getElementById('main-slide');
        let autoPlayInterval = null;

        function updateSlide() { img.src = select.value; }
        function changeSlide(direction) {
            select.selectedIndex = (select.selectedIndex + direction + select.options.length) % select.options.length;
            updateSlide();
        }
        function toggleAutoPlay() {
            const btn = document.getElementById('play-btn');
            if (autoPlayInterval) { clearInterval(autoPlayInterval); autoPlayInterval = null; btn.textContent = "Start"; } 
            else { autoPlayInterval = setInterval(() => changeSlide(1), 3000); btn.textContent = "Stop"; }
        }
    </script>
